name: Build release installer

on:
  push:
    tags:
      - "v*.*"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Resolve release version
        run: |
          $tag = "${{ github.ref_name }}"

          if (-not $tag.StartsWith("v")) {
            throw "Release tags must start with 'v'. Current tag: $tag"
          }

          $version = $tag.Substring(1)

          if ($version -notmatch '^\d+\.\d+$') {
            throw "Release tag must use v1.3 style. Current tag: $tag"
          }

          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Check project version
        run: |
          [xml]$projectXml = Get-Content -Raw -LiteralPath "GoodbyeDPIManager\GoodbyeDPIManager.csproj"
          $projectVersion = $projectXml.Project.PropertyGroup |
            ForEach-Object { $_.Version } |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            Select-Object -First 1

          if ($projectVersion -ne $env:APP_VERSION) {
            throw "Project version '$projectVersion' does not match tag version '$env:APP_VERSION'."
          }

      - name: Build installer
        run: .\scripts\build-release.ps1 -Version $env:APP_VERSION

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $setupFileName = "GoodbyeDPIManager_v{0}_Setup.exe" -f $env:APP_VERSION
          $setup = Get-ChildItem -LiteralPath "installer\Output" -Filter $setupFileName | Select-Object -First 1

          if (-not $setup) {
            throw "Expected installer was not found: installer\Output\$setupFileName"
          }

          gh release view $env:RELEASE_TAG *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            gh release upload $env:RELEASE_TAG $setup.FullName --clobber
          }
          else {
            gh release create $env:RELEASE_TAG $setup.FullName --verify-tag --title $env:RELEASE_TAG --generate-notes
          }

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to publish release asset."
          }
