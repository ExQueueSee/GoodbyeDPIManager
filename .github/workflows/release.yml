name: Build Velopack release

on:
  push:
    tags:
      - "v*.*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    env:
      DOTNET_ROLL_FORWARD: Major

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore Velopack tool
        run: dotnet tool restore

      - name: Resolve release version
        run: |
          $tag = "${{ github.ref_name }}"

          if (-not $tag.StartsWith("v")) {
            throw "Release tags must start with 'v'. Current tag: $tag"
          }

          $version = $tag.Substring(1)

          if ($version -notmatch '^\d+\.\d+$') {
            throw "Release tag must use v1.4 style. Current tag: $tag"
          }

          $packageVersion = "$version.0"

          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "PACKAGE_VERSION=$packageVersion" >> $env:GITHUB_ENV
          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Check project version
        run: |
          [xml]$projectXml = Get-Content -Raw -LiteralPath "GoodbyeDPIManager\GoodbyeDPIManager.csproj"
          $projectVersion = $projectXml.Project.PropertyGroup |
            ForEach-Object { $_.Version } |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            Select-Object -First 1

          if ($projectVersion -ne $env:APP_VERSION) {
            throw "Project version '$projectVersion' does not match tag version '$env:APP_VERSION'."
          }

      - name: Download previous Velopack release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path "Releases" | Out-Null

          try {
            dotnet tool run vpk -- download github --repoUrl "https://github.com/ExQueueSee/GoodbyeDPIManager" --outputDir "Releases" --channel "win" --token $env:GH_TOKEN

            if ($LASTEXITCODE -ne 0) {
              Write-Host "No previous Velopack release was downloaded. Continuing with a full package only."
            }
          }
          catch {
            Write-Host "No previous Velopack release was downloaded. Continuing with a full package only."
            Write-Host $_
          }

      - name: Build Velopack release
        run: .\scripts\build-release.ps1 -Version $env:APP_VERSION -OutputDir "Releases" -PreserveReleaseOutput

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:RELEASE_TAG *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if (-not $releaseExists) {
            gh release create $env:RELEASE_TAG --verify-tag --title "GoodbyeDPI Manager v$env:APP_VERSION" --generate-notes
          }

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create or inspect GitHub Release."
          }

          dotnet tool run vpk -- upload github `
            --repoUrl "https://github.com/ExQueueSee/GoodbyeDPIManager" `
            --outputDir "Releases" `
            --channel "win" `
            --token $env:GH_TOKEN `
            --tag $env:RELEASE_TAG `
            --releaseName "GoodbyeDPI Manager v$env:APP_VERSION" `
            --publish `
            --merge

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to publish Velopack release assets."
          }
